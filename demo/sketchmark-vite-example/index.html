<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sketchmark - Vite Embed Example</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 18px;
        background:
          radial-gradient(circle at top, rgba(205, 236, 255, 0.34), transparent 34%),
          linear-gradient(180deg, #fbf8f0 0%, #efe7d8 100%);
        color: #1d140b;
        font-family: "Courier New", monospace;
      }

      .shell {
        width: min(100%, 1080px);
        display: grid;
        gap: 18px;
        justify-items: center;
      }

      .copy {
        width: min(100%, 820px);
        text-align: center;
      }

      .eyebrow {
        margin: 0 0 12px;
        color: #7b6b43;
        font-size: 12px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 5vw, 42px);
        line-height: 1.05;
      }

      .lede {
        margin: 12px auto 0;
        max-width: 700px;
        color: #655135;
        font-size: 14px;
        line-height: 1.6;
      }

      #embed-root {
        width: 100%;
        display: flex;
        justify-content: center;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
      }

      button {
        border: 1px solid #c3a46b;
        border-radius: 999px;
        background: #1a1208;
        color: #fff8ea;
        padding: 10px 16px;
        font: inherit;
        font-size: 12px;
        letter-spacing: 0.04em;
        cursor: pointer;
        transition: transform 0.14s ease, background 0.14s ease, border-color 0.14s ease;
      }

      button:hover {
        background: #2d8a4e;
        border-color: #2d8a4e;
        transform: translateY(-1px);
      }

      .note {
        margin: 0;
        color: #876238;
        font-size: 12px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <section class="shell">
      <div class="copy">
        <p class="eyebrow">Vite + Sketchmark</p>
        <h1>Embedded Architecture Diagram</h1>
        <p class="lede">
          This Vite demo mounts a reusable <code>SketchmarkEmbed</code> instance.
          It keeps the animation controls inside the widget and lets the camera
          follow the active step inside a clipped frame.
        </p>
      </div>

      <div id="embed-root"></div>

      <div class="actions">
        <button id="btn-svg" type="button">Download SVG</button>
        <button id="btn-png" type="button">Download PNG</button>
      </div>

      <p class="note">
        Edit <code>src/main.ts</code> to change the DSL or embed options.
      </p>
    </section>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

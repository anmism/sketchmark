<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Calvin Cycle - Sketchmark Embed</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 18px;
        background:
          radial-gradient(circle at top, rgba(255, 235, 170, 0.45), transparent 34%),
          linear-gradient(180deg, #fcf8ef 0%, #f3ebd8 100%);
        color: #2f1d0f;
        font-family: "Courier New", monospace;
      }

      .demo-shell {
        width: min(100%, 1080px);
        display: grid;
        gap: 18px;
        justify-items: center;
      }

      .demo-copy {
        width: min(100%, 900px);
        text-align: center;
      }

      .eyebrow {
        margin: 0 0 10px;
        color: #9f6d2c;
        font-size: 12px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 5vw, 44px);
        line-height: 1.05;
      }

      .lede {
        margin: 12px auto 0;
        max-width: 720px;
        color: #6f5331;
        line-height: 1.6;
        font-size: 14px;
      }

      #embed-host {
        width: 100%;
        display: flex;
        justify-content: center;
      }

      .demo-actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
      }

      button {
        border: 1px solid #c3a46b;
        border-radius: 999px;
        background: #1a1208;
        color: #fff8ea;
        padding: 10px 16px;
        font: inherit;
        font-size: 12px;
        letter-spacing: 0.04em;
        cursor: pointer;
        transition: transform 0.14s ease, background 0.14s ease, border-color 0.14s ease;
      }

      button:hover {
        background: #2d8a4e;
        border-color: #2d8a4e;
        transform: translateY(-1px);
      }

      .note {
        margin: 0;
        color: #876238;
        font-size: 12px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <section class="demo-shell">
      <div class="demo-copy">
        <p class="eyebrow">Embedded Sketchmark</p>
        <h1>The Calvin Cycle</h1>
        <p class="lede">
          This example uses the fixed-size <code>SketchmarkEmbed</code> widget.
          The frame stays clipped, and the camera recenters on the active target
          while the animation plays.
        </p>
      </div>

      <div id="embed-host"></div>

      <div class="demo-actions">
        <button id="btn-svg" type="button">Download SVG</button>
        <button id="btn-png" type="button">Download PNG</button>
      </div>

      <p class="note">
        Use the built-in step controls inside the embed to play through the cycle.
      </p>
    </section>

    <script type="module">
      import { SketchmarkEmbed } from "../../dist/index.js";

      const dsl = `
diagram
title label="The Calvin Cycle"
layout column
config gap=40
config margin=50
config pointer=chalk
config tts=on
config title-size=28
config title-weight=700
config font=patrick-hand

theme input    fill="#e3f2fd" stroke="#1565c0" color="#0d47a1"
theme co2      fill="#ffebee" stroke="#c62828" color="#b71c1c"
theme cycle    fill="#fff9c4" stroke="#f9a825" color="#5d4037"
theme energy   fill="#e8f5e9" stroke="#2e7d32" color="#1b5e20"
theme product  fill="#f3e5f5" stroke="#7b1fa2" color="#4a148c"
theme enzyme   fill="#fff3e0" stroke="#e65100" color="#bf360c"
theme neutral  fill="#f5f5f5" stroke="#616161" color="#212121"
theme light    fill="#fffde7" stroke="#f9a825" color="#f57f17"
theme water    fill="#e0f7fa" stroke="#00838f" color="#006064"
theme o2       fill="#e8eaf6" stroke="#283593" color="#1a237e"

box h2o     label="6 H2O\\n(from soil)" theme=water width=110 height=55
box light   label="Photons\\nof Light" theme=light width=110 height=55
box co2in   label="6 CO2\\n(from air)" theme=co2 width=110 height=55
box stomata label="Stomata" theme=neutral width=100 height=45
group inputs label="Inputs" layout=row gap=30 fill="#fafafa" stroke="#bdbdbd" padding=20 items=[h2o,light,co2in,stomata]

box rubp    label="6 RuBP\\n(5-carbon)" theme=cycle width=130 height=55
box rubisco label="RuBisCO\\n(enzyme)" theme=enzyme width=130 height=55
box inter   label="6 Intermediate\\n(6-carbon)" theme=cycle width=160 height=55
group fixation label="Phase 1 - Carbon Fixation" layout=row gap=30 fill="#fff8e1" stroke="#ffb300" padding=20 items=[rubp,rubisco,inter]

box pga   label="12 PGA\\n(3-carbon)" theme=cycle width=130 height=55
box atp1  label="12 ATP" theme=energy width=90 height=45
box nadph label="12 NADPH" theme=energy width=110 height=45
box pgal  label="12 PGAL\\n(3-carbon)" theme=cycle width=130 height=55
group reduction label="Phase 2 - Reduction" layout=row gap=30 fill="#e8f5e9" stroke="#66bb6a" padding=20 items=[pga,atp1,nadph,pgal]

box o2out label="O2\\n(released)" theme=o2 width=110 height=50
box adp   label="12 ADP" theme=neutral width=100 height=40
box nadp  label="12 NADP+" theme=neutral width=110 height=40
group lightdep label="Light-Dependent Reactions\\n(in thylakoids)" layout=column gap=15 fill="#e3f2fd" stroke="#1565c0" padding=20 items=[o2out,adp,nadp]

box pgal10  label="10 PGAL\\n(recycled)" theme=cycle width=140 height=55
box atp2    label="6 ATP\\n(used)" theme=energy width=100 height=50
box pgal2   label="2 PGAL" theme=product width=100 height=50
box glucose label="1 Glucose\\n(C6H12O6)" theme=product width=150 height=55
group output label="Phase 3 - Regeneration and Output" layout=row gap=30 fill="#f3e5f5" stroke="#ab47bc" padding=20 items=[pgal10,atp2,pgal2,glucose]

markdown carbonnote width=220
"""
### Carbon Fixation
Atmospheric **CO2** (inorganic) is converted into **organic** compounds
"""

co2in   -> rubisco  label="CO2 enters"
h2o     -> lightdep label="H2O split"
light   -> lightdep label="energy"
stomata -> co2in    label="air intake"

rubp    -> inter    label="combines\\nwith CO2"
rubisco -> inter    label="catalyzes"

inter   -> pga     label="breaks apart"
atp1    -> pgal    label="energy"
nadph   -> pgal    label="electrons"
pga     -> pgal    label="reduced"

lightdep -> atp1   label="produces"
lightdep -> nadph  label="produces"
pgal    -> adp     label="returns"
pgal    -> nadp    label="returns"

pgal    -> pgal10  label="10 of 12"
pgal    -> pgal2   label="2 of 12"
pgal10  -> rubp    label="regenerates"
atp2    -> pgal10  label="energy for\\nregeneration"
pgal2   -> glucose label="combine"

step narrate "The Calvin Cycle converts CO2 into glucose using energy from light reactions" pace=slow

beat {
  step draw h2o
  step draw light
  step draw stomata
}
step draw co2in
step draw stomata->co2in

step narrate "Phase 1: Carbon Fixation - RuBisCO combines CO2 with RuBP" pace=slow
step draw rubp
step draw rubisco
step circle rubisco
step draw co2in->rubisco
step draw rubp->inter
step draw rubisco->inter
step draw inter
step underline inter

step narrate "Phase 2: Reduction - ATP and NADPH convert PGA into PGAL"
step draw inter->pga
step draw pga

step narrate "The light-dependent reactions in the thylakoids provide ATP and NADPH"
step draw lightdep
step draw o2out
step draw h2o->lightdep
step draw light->lightdep
beat {
  step draw atp1
  step draw nadph
}
step draw lightdep->atp1
step draw lightdep->nadph

step narrate "PGA is reduced to PGAL using ATP and NADPH" pace=slow
step draw atp1->pgal
step draw nadph->pgal
step draw pga->pgal
step draw pgal
step circle pgal

step narrate "Spent energy carriers return to light reactions"
beat {
  step draw adp
  step draw nadp
  step draw pgal->adp
  step draw pgal->nadp
}

step narrate "Phase 3: Of the 12 PGAL molecules, 10 are recycled and 2 make glucose" pace=slow
step draw pgal->pgal10
step draw pgal10
step draw atp2
step draw atp2->pgal10

step narrate "The 10 PGAL molecules regenerate 6 RuBP - completing the cycle"
step draw pgal10->rubp
step circle rubp

step narrate "The remaining 2 PGAL combine to form 1 glucose molecule" pace=slow
step draw pgal->pgal2
step draw pgal2
step draw pgal2->glucose
step draw glucose
step circle glucose

step narrate "Carbon fixation turns atmospheric carbon into organic compounds"
step draw carbonnote

step narrate "The Calvin Cycle runs 6 times to produce 1 glucose from 6 CO2" pace=pause
end
      `.trim();

      const embed = new SketchmarkEmbed({
        container: document.getElementById("embed-host"),
        dsl,
        width: "min(100%, 960px)",
        height: 620,
        playStepDelay: 700,
        focusPadding: 36,
        focusDuration: 240,
        showControls: true,
        theme: "light",
        svgOptions: {
          showTitle: true,
          interactive: true,
          transparent: true,
        },
      });

      document.getElementById("btn-svg").addEventListener("click", () => {
        embed.exportSVG("calvin-cycle.svg");
      });

      document.getElementById("btn-png").addEventListener("click", () => {
        void embed.exportPNG("calvin-cycle.png");
      });
    </script>
  </body>
</html>

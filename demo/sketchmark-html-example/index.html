<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sketchmark - HTML Embed Example</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 18px;
        background:
          radial-gradient(circle at top, rgba(255, 232, 180, 0.42), transparent 32%),
          linear-gradient(180deg, #fcf8ef 0%, #f4ebdb 100%);
        color: #201208;
        font-family: "Courier New", monospace;
      }

      .shell {
        width: min(100%, 1080px);
        display: grid;
        gap: 18px;
        justify-items: center;
      }

      .copy {
        width: min(100%, 820px);
        text-align: center;
      }

      .eyebrow {
        margin: 0 0 12px;
        color: #9b6d32;
        font-size: 12px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 5vw, 42px);
        line-height: 1.05;
      }

      .lede {
        margin: 12px auto 0;
        max-width: 700px;
        color: #735431;
        font-size: 14px;
        line-height: 1.6;
      }

      #embed-root {
        width: 100%;
        display: flex;
        justify-content: center;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
      }

      button {
        border: 1px solid #c29f63;
        border-radius: 999px;
        background: #1a1208;
        color: #fff8ea;
        padding: 10px 16px;
        font: inherit;
        font-size: 12px;
        letter-spacing: 0.04em;
        cursor: pointer;
        transition: transform 0.14s ease, background 0.14s ease, border-color 0.14s ease;
      }

      button:hover {
        background: #c85428;
        border-color: #c85428;
        transform: translateY(-1px);
      }

      .note {
        margin: 0;
        color: #876238;
        font-size: 12px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <section class="shell">
      <div class="copy">
        <p class="eyebrow">No Build Step</p>
        <h1>Sketchmark HTML Embed</h1>
        <p class="lede">
          This plain HTML example uses <code>SketchmarkEmbed</code> from the CDN.
          The diagram stays inside a fixed frame, clips overflow, and follows the
          active step while the animation plays.
        </p>
      </div>

      <div id="embed-root"></div>

      <div class="actions">
        <button id="btn-svg" type="button">Download SVG</button>
        <button id="btn-png" type="button">Download PNG</button>
      </div>

      <p class="note">
        Playback controls live inside the embed itself.
      </p>
    </section>

    <script type="module">
      import { SketchmarkEmbed } from "https://unpkg.com/sketchmark/dist/index.js";

      const dsl = `
diagram
title label="How the Internet Delivers a Webpage"
layout row
config gap=50
config pointer=chalk
config tts=on

theme primary fill="#e8f4ff" stroke="#0044cc" color="#003399"
theme success fill="#e8ffe8" stroke="#007700" color="#004400"
theme warning fill="#fff9e6" stroke="#f0a500" color="#7a5000"
theme muted   fill="#f5f5f5" stroke="#999999" color="#444444"

box you     label="You"              theme=warning width=120 height=50
box browser label="Browser"          theme=primary width=120 height=50
box dns     label="DNS\\nServer"      theme=muted   width=120 height=55
box server  label="Web\\nServer"      theme=success width=120 height=55
box html    label="HTML\\nCSS JS"     theme=primary width=120 height=55
box screen  label="Rendered\\nPage"   theme=warning width=120 height=55

you     --> browser label="types URL"
browser --> dns     label="lookup"
dns     --> browser label="IP address"
browser --> server  label="request"
server  --> html    label="responds"
html    --> screen  label="renders"

step narrate "You type a website address into your browser" pace=slow
step draw you
step draw browser
step draw you-->browser
step underline you
step narrate "The browser asks a DNS server, the internet's phone book"
step draw dns
step draw browser-->dns
step circle dns
step narrate "DNS translates the domain name into an IP address"
step draw dns-->browser
step narrate "Now the browser knows where to go" pace=slow
beat {
  step draw server
  step draw browser-->server
}
step narrate "It sends a request to the web server at that address"
step underline server
step narrate "The server responds with HTML, CSS, and JavaScript" pace=slow
beat {
  step draw html
  step draw server-->html
}
step circle html
step narrate "The browser assembles everything into the page you see"
step draw html-->screen
step draw screen pace=slow
step bracket html screen
step narrate "All of this happens in under a second" pace=pause
end
      `.trim();

      const embed = new SketchmarkEmbed({
        container: document.getElementById("embed-root"),
        dsl,
        width: "min(100%, 960px)",
        height: 560,
        playStepDelay: 700,
        focusPadding: 32,
        focusDuration: 240,
        showControls: true,
        theme: "light",
        svgOptions: {
          showTitle: true,
          interactive: true,
          transparent: true,
        },
      });

      document.getElementById("btn-svg").addEventListener("click", () => {
        embed.exportSVG("html-example.svg");
      });

      document.getElementById("btn-png").addEventListener("click", () => {
        void embed.exportPNG("html-example.png");
      });
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>sketchmark Playground</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body   { display: flex; flex-direction: column; height: 100vh; font-family: system-ui, sans-serif; background: #18160e; color: #e0c898; }
    header { display: flex; align-items: center; gap: 12px; height: 48px; padding: 0 16px; background: #12100a; border-bottom: 2px solid #3a2a12; flex-shrink: 0; }
    header h1 { font-size: 16px; font-weight: 500; color: #f0c96a; }
    select, button { background: #22190e; color: #dcc48a; border: 1px solid #4a3520; border-radius: 6px; padding: 3px 10px; cursor: pointer; font-size: 13px; }
    button.primary { background: #c85428; color: #fff; border-color: #c85428; font-weight: 500; }
    button:hover { border-color: #c06030; }
    main   { flex: 1; display: flex; overflow: hidden; }
    #editor-pane { width: 340px; display: flex; flex-direction: column; background: #131008; border-right: 2px solid #3a2a12; flex-shrink: 0; }
    #toolbar { display: flex; gap: 8px; align-items: center; padding: 6px 10px; background: #1c1608; border-bottom: 1px solid #3a2a12; }
    textarea { flex: 1; background: #131008; color: #e0c898; border: none; outline: none; resize: none; padding: 12px 14px; font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.75; caret-color: #f0c96a; }
    #error { padding: 6px 12px; background: #280a0a; color: #f07070; font-family: monospace; font-size: 11px; display: none; border-top: 1px solid #5a1818; }
    #canvas-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #anim-bar { display: flex; align-items: center; gap: 8px; padding: 4px 10px; background: #eee7d8; border-bottom: 1.5px solid #caba98; flex-shrink: 0; }
    #anim-bar button { background: #f5eedd; color: #3a2010; border: 1.5px solid #caba98; }
    #anim-bar button:hover { background: #c8a060; color: #fff; border-color: #c8a060; }
    #step-display { font-size: 12px; color: #6a4820; min-width: 110px; text-align: center; }
    #step-label   { font-size: 12px; color: #8a6040; font-style: italic; }
    .sep { flex: 1; }
    #stats { font-size: 11px; color: #9a7848; font-family: monospace; }
    #diagram-wrap { flex: 1; overflow: auto; background: #f8f4ea; background-image: linear-gradient(rgba(170,145,100,.14) 1px, transparent 1px), linear-gradient(90deg, rgba(170,145,100,.14) 1px, transparent 1px); background-size: 28px 28px; padding: 24px; }
  </style>
</head>
<body>
  <header>
    <h1>✏ sketchmark playground</h1>
    <select id="examples">
      <option value="arch">🏗 Architecture</option>
      <option value="auth">🔐 Auth Flow + Animation</option>
      <option value="micro">⚙ Microservices</option>
      <option value="nested">📦 Nested Groups</option>
      <option value="pyramid">🔺 Pyramid Layout</option>
      <option value="network">🌐 Network Stack</option>
    </select>
    <div class="sep"></div>
    <button id="export-svg">↓ SVG</button>
    <button id="export-png">↓ PNG</button>
  </header>
  <main>
    <div id="editor-pane">
      <div id="toolbar">
        <button class="primary" id="run">▶ Run</button>
        <span style="font-size:11px;color:#6a5030;font-family:monospace">Ctrl+Enter</span>
      </div>
      <textarea id="dsl" spellcheck="false"></textarea>
      <div id="error"></div>
    </div>
    <div id="canvas-pane">
      <div id="anim-bar">
        <button id="reset-anim">↺</button>
        <button id="prev-step" disabled>←</button>
        <span id="step-display">No steps</span>
        <button id="next-step" disabled>→</button>
        <button id="play-anim">▶ Play</button>
        <span id="step-label"></span>
        <div class="sep"></div>
        <span id="stats"></span>
      </div>
      <div id="diagram-wrap"></div>
    </div>
  </main>

  <script src="https://unpkg.com/roughjs@4.6.6/bundled/rough.js"></script>

gateway --> auth
gateway --> billing
auth    --> database label="SQL"
billing --> database label="SQL"

step highlight client
step draw client-->gateway
step highlight gateway
step draw gateway-->auth
step draw gateway-->billing
step highlight auth
step draw auth-->database
step highlight database

    let instance = null;

    function runDiagram() {
      const dsl  = document.getElementById('dsl').value;
      const err  = document.getElementById('error');
      const wrap = document.getElementById('diagram-wrap');
      try {
        err.style.display = 'none';
        wrap.innerHTML    = '';
        instance = render({
          container:  wrap,
          dsl,
          renderer:   'svg',
          svgOptions: { interactive: true, showTitle: true },
        });
        syncAnim();
        document.getElementById('stats').textContent =
          `${instance.scene.nodes.length}n · ${instance.scene.edges.length}e`;
      } catch (e) {
        err.style.display = 'block';
        err.textContent   = '⚠ ' + e.message;
        console.error(e);
      }
    }

    function syncAnim() {
      if (!instance) return;
      const { anim }  = instance;
      const display   = document.getElementById('step-display');
      const label     = document.getElementById('step-label');
      if (!anim.total) { display.textContent = 'No steps'; label.textContent = ''; return; }
      display.textContent = anim.currentStep < 0
        ? `${anim.total} steps`
        : `${anim.currentStep + 1} / ${anim.total}`;
      label.textContent = anim.currentStep >= 0
        ? `${anim.steps[anim.currentStep].action} ${anim.steps[anim.currentStep].target}`
        : '';
      document.getElementById('prev-step').disabled = !anim.canPrev;
      document.getElementById('next-step').disabled = !anim.canNext;
    }

    document.getElementById('run').onclick = runDiagram;
    document.getElementById('dsl').addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') runDiagram();
    });
    document.getElementById('reset-anim').onclick = () => { instance?.anim.reset(); syncAnim(); };
    document.getElementById('prev-step').onclick  = () => { instance?.anim.prev();  syncAnim(); };
    document.getElementById('next-step').onclick  = () => { instance?.anim.next();  syncAnim(); };
    document.getElementById('play-anim').onclick  = async () => {
      await instance?.anim.play(800); syncAnim();
    };
    document.getElementById('export-svg').onclick = () => instance?.exportSVG();
    document.getElementById('export-png').onclick = () => instance?.exportPNG();
    document.getElementById('examples').onchange  = function () {
      document.getElementById('dsl').value = EXAMPLES[this.value];
      runDiagram();
    };

    // Load default on startup
    document.getElementById('dsl').value = EXAMPLES.arch;
    runDiagram();
